<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="albionbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C1C"/>
      <stop offset="50%" style="stop-color:#2A2118"/>
      <stop offset="100%" style="stop-color:#1C1C1C"/>
    </linearGradient>
    <linearGradient id="albiongold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B6914"/>
      <stop offset="50%" style="stop-color:#C9A642"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <radialGradient id="parchglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#C9A642;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#C9A642;stop-opacity:0"/>
    </radialGradient>
    <filter id="alglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="albClip"><rect width="900" height="300" rx="12"/></clipPath>
  </defs>
  <g clip-path="url(#albClip)">
    <rect width="900" height="300" fill="url(#albionbg)"/>
    <rect width="900" height="300" fill="url(#parchglow)"/>
    <!-- Parchment texture lines -->
    <g stroke="#C9A642" stroke-width="0.2" opacity="0.06">
      <line x1="0" y1="20" x2="900" y2="20"/><line x1="0" y1="40" x2="900" y2="40"/>
      <line x1="0" y1="60" x2="900" y2="60"/><line x1="0" y1="80" x2="900" y2="80"/>
      <line x1="0" y1="100" x2="900" y2="100"/><line x1="0" y1="120" x2="900" y2="120"/>
      <line x1="0" y1="140" x2="900" y2="140"/><line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="180" x2="900" y2="180"/><line x1="0" y1="200" x2="900" y2="200"/>
      <line x1="0" y1="220" x2="900" y2="220"/><line x1="0" y1="240" x2="900" y2="240"/>
      <line x1="0" y1="260" x2="900" y2="260"/><line x1="0" y1="280" x2="900" y2="280"/>
    </g>
    <!-- Sword silhouette left -->
    <g fill="#C9A642" opacity="0.12">
      <rect x="120" y="60" width="4" height="180" rx="2"/>
      <rect x="108" y="220" width="28" height="6" rx="3"/>
      <polygon points="122,60 130,40 114,40"/>
    </g>
    <!-- Shield silhouette right -->
    <g fill="#C9A642" opacity="0.12">
      <path d="M760,80 L810,80 L810,160 Q785,200 760,160 Z" stroke="#C9A642" stroke-width="2" fill="none" opacity="0.15"/>
      <line x1="785" y1="85" x2="785" y2="190" stroke="#C9A642" stroke-width="1" opacity="0.1"/>
      <line x1="762" y1="120" x2="808" y2="120" stroke="#C9A642" stroke-width="1" opacity="0.1"/>
    </g>
    <!-- Medieval corner ornaments -->
    <g stroke="#C9A642" stroke-width="1.5" fill="none" opacity="0.2">
      <path d="M20,20 L60,20 M20,20 L20,60"/>
      <path d="M880,20 L840,20 M880,20 L880,60"/>
      <path d="M20,280 L60,280 M20,280 L20,240"/>
      <path d="M880,280 L840,280 M880,280 L880,240"/>
    </g>
    <!-- Decorative divider -->
    <line x1="250" y1="70" x2="650" y2="70" stroke="url(#albiongold)" stroke-width="1" opacity="0.4"/>
    <circle cx="450" cy="70" r="4" fill="#C9A642" opacity="0.4"/>
    <!-- Title -->
    <text x="450" y="120" font-family="Georgia,Times New Roman,serif" font-size="48" font-weight="700" fill="#C9A642" text-anchor="middle" filter="url(#alglow)">ALBION</text>
    <text x="450" y="160" font-family="Segoe UI,Arial,sans-serif" font-size="28" font-weight="600" fill="#E8D5A3" text-anchor="middle" letter-spacing="8">MOD MENU</text>
    <!-- Feature pills -->
    <g font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="600">
      <rect x="175" y="190" width="75" height="22" rx="11" fill="#C9A642" opacity="0.25" stroke="#C9A642" stroke-width="0.5"/>
      <text x="212" y="205" fill="#C9A642" text-anchor="middle">ESP</text>
      <rect x="265" y="190" width="100" height="22" rx="11" fill="#C9A642" opacity="0.25" stroke="#C9A642" stroke-width="0.5"/>
      <text x="315" y="205" fill="#C9A642" text-anchor="middle">SPEED</text>
      <rect x="380" y="190" width="110" height="22" rx="11" fill="#C9A642" opacity="0.25" stroke="#C9A642" stroke-width="0.5"/>
      <text x="435" y="205" fill="#C9A642" text-anchor="middle">GATHER</text>
      <rect x="505" y="190" width="110" height="22" rx="11" fill="#C9A642" opacity="0.25" stroke="#C9A642" stroke-width="0.5"/>
      <text x="560" y="205" fill="#C9A642" text-anchor="middle">COMBAT</text>
      <rect x="630" y="190" width="100" height="22" rx="11" fill="#C9A642" opacity="0.25" stroke="#C9A642" stroke-width="0.5"/>
      <text x="680" y="205" fill="#C9A642" text-anchor="middle">MAP</text>
    </g>
    <!-- Version -->
    <text x="450" y="250" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#8B7340" text-anchor="middle">v2.1 � Sandbox MMORPG</text>
    <!-- Bottom divider -->
    <line x1="250" y1="268" x2="650" y2="268" stroke="url(#albiongold)" stroke-width="1" opacity="0.3"/>
  </g>
</svg>
